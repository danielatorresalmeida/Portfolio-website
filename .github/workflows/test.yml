name: Run Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["18", "20"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit and contract tests
        run: npm test

      - name: Validate local links and assets
        if: ${{ matrix.node-version == '20' }}
        run: npm run validate:links

      - name: Audit production dependencies
        if: ${{ matrix.node-version == '20' }}
        run: npm audit --omit=dev

      - name: Set up Chrome
        if: ${{ matrix.node-version == '20' }}
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run accessibility checks
        if: ${{ matrix.node-version == '20' }}
        env:
          CI: "true"
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run test:a11y

      - name: Run Selenium smoke tests
        if: ${{ matrix.node-version == '20' }}
        env:
          CI: "true"
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run test:e2e

      - name: Run visual regression snapshots
        if: ${{ matrix.node-version == '20' }}
        env:
          CI: "true"
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run test:visual

      - name: Upload visual snapshot artifacts
        if: ${{ matrix.node-version == '20' && always() }}
        uses: actions/upload-artifact@v4
        with:
          name: visual-snapshots-${{ github.run_id }}
          path: tests/visual/artifacts
